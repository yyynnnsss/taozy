<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-CN">
</html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="applicable-device" content="pc,mobile">
    <meta name="renderer" content="webkit">
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1,viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-transform" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <link rel="canonical" href="lanzouyunjiexi.html">
    <title>蓝奏云直链解析工具</title>
    <meta name="keywords" content="蓝奏云直链,蓝奏云,蓝奏云直链解析,蓝奏云url直链,蓝奏云链接,蓝奏云网盘直链解析">
    <meta name="description"
        content="蓝奏云直链解析工具是一款在线帮用户快速提取蓝奏云网盘直链的辅助工具。支持有密码的蓝奏云链接，输入链接直接点击解析即可，非常方便，点击复制可以直接下载，下载速度非常快，操作也很简单。">
    <!-- 布局css -->
    <link href="zhanid.css" rel="stylesheet" type="text/css">
    <link href="zhanid-response.min.css" rel="stylesheet" type="text/css">
    <link href="css.css" rel="stylesheet" type="text/css">
    <!-- 时间计算器j -->
    <script type="text/javascript" src="time.js"></script>    
</head>
<!--蓝奏云解析开始-->
<body>
    <div class="ax-panel ax-padding">
        <div class="ax-panel-body ax-tools">
            <div class="title">
                <h1 class="bl fz18">蓝奏云直链解析</h1>
                <div class="titler">
                    <p id="dateTime"></p>
                </div>
            </div>
            <div class="ax-break"></div>
            <section class="demo-section">
                <form id="form">
                    <p>填入蓝奏云分享链接，无密码则留空，点解析即可获取直链。</p>
                    <div class="ax-row ax-input-group">
                        <span class="ax-prefix">链接：</span>
                        <div class="ax-flex-block">
                            <input type="text" id="url" placeholder="请输入要解析的链接" required>
                        </div>
                    </div>
                    <div class="ax-break"></div>
                    <div class="ax-row ax-input-group">
                        <span class="ax-prefix">密码：</span>
                        <div class="ax-flex-block">
                            <input type="text" id="pwd" placeholder="请输入密码（无密码则留空）">
                        </div>
                    </div>
                    <div class="tcenter p1">
                        <button type="submit" class="ax-btn ax-success">提交解析</button>
                    </div>
                </form>
                <div id="output" class="ax-alert" theme="success">因服务器原因，解析可能较慢,请您耐心等待</div>
            </section>
            <div class="ax-break-md"></div>
            <hr>
            <div class="ax-break-md"></div>
            <!--工具简介-->
            <section>
                <div class="title">
                    <h2 class="bl fz16">工具介绍</h2>
                </div>
                <article>
                    <p>蓝奏云直链解析工具是一款在线帮用户快速提取蓝奏云网盘直链的辅助工具。支持有密码的蓝奏云链接，输入链接直接点击解析即可，非常方便，点击复制可以直接下载，下载速度非常快，操作也很简单。</p>
                    <h3>主要特色</h3>
                    <p>1、可以帮助用户将蓝奏云的文件分享链接解析成可以直接下载的直链。</p>
                    <p>2、支持一键复制直链，解析完成后可以一键将直链复制到粘贴板中。</p>
                    <p>3、该工具可以帮助偶尔在蓝奏云上下载文件的用户提供便利，节省时间。</p>
                </article>
            </section>
            <!--工具简介结束-->
            <script>
                const form = document.querySelector('#form');
                const output = document.querySelector('#output');
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    output.style.display = 'none';
                    // 获取输入框的值
                    const url = document.querySelector('#url').value;
                    const pwd = document.querySelector('#pwd').value;
                    // 蓝奏云解析API 地址 
                    let apiUrl = `http://flexhook.eu.org/lzy/?url=${encodeURIComponent(url)}`;
                    let apiUrl1 = `https://lz.qaiu.top/json/parser?url=${encodeURIComponent(url)}`;
                    if (pwd !== '') {
                        apiUrl += `&p=${encodeURIComponent(pwd)}`;
                        apiUrl1 += `&pwd=${encodeURIComponent(pwd)}`;
                    }
                    
                    // 初始化显示容器，预留两个结果区域
                    output.innerHTML = `
                        <div id="resultContainer1"><p>正在解析第一个接口...</p></div>
                        <hr>
                        <div id="resultContainer2"><p>正在解析第二个接口...</p></div>
                    `;
                    output.style.display = 'block';
                    
                    // 发送第1个请求 (API1)
                    fetch(apiUrl)
                        .then(response => response.json())
                        .then(data => {
                            const fileInfo = data.data || {};
                            const name = fileInfo.name || '未知文件名';
                            const size = fileInfo.size || '未知大小';
                            const fileUrl = fileInfo.url || '#';
                            
                            document.querySelector('#resultContainer1').innerHTML = `
                                <p><strong>解析结果：</strong>${data.msg || '解析成功'}</p>
                                <p><strong>文件名：</strong> ${name}</p>
                                <p><strong>文件大小：</strong> ${size}</p>
                                <p><strong>文件直链：</strong></p>
                                <pre id="copyTarget4">${fileUrl}</pre>
                                <button id="copyBtn4" class="ax-btn ax-primary ax-sm">复制文件链接</button>
                                <button class="download-btn4 ax-btn ax-primary ax-sm" data-url="${fileUrl}">下载文件</button>
                                <br>
                                <p><strong>永久直链1：</strong></p>
                                <pre id="copyTarget">http://flexhook.eu.org/lzy/?url=${encodeURIComponent(url)}&p=${encodeURIComponent(pwd)}&type=down</pre>
                                <button id="copyBtn" class="ax-btn ax-primary ax-sm">复制永久链接1</button>
                            `;
                        })
                        .catch(error => {
                            document.querySelector('#resultContainer1').innerText = `出错了：${error.message}`;
                        });
                    
                    // 发送第2个请求 (API2)
                    fetch(apiUrl1)
                        .then(response => response.json())
                        .then(data => {
                            const fileInfo = data.data || {};
                            const fileUrl = fileInfo.directLink || '#';
                            
                            document.querySelector('#resultContainer2').innerHTML = `
                                <p><strong>解析结果：</strong>${data.msg || '解析成功'}</p>
                                <p><strong>文件直链：</strong></p>
                                <pre id="copyTarget5">${fileUrl}</pre>
                                <button id="copyBtn5" class="ax-btn ax-primary ax-sm">复制文件链接</button>
                                <button class="download-btn5 ax-btn ax-primary ax-sm" data-url="${fileUrl}">下载文件</button>
                                <p><strong>永久直链2：</strong></p>
                        <pre id="copyTarget2">https://lz.qaiu.top/parser?url=${encodeURIComponent(url)}&pwd=${encodeURIComponent(pwd)}&type=down</pre>
                        <button id="copyBtn2" class="ax-btn ax-primary ax-sm">复制永久链接2</button>
                            `;
                        })
                        .catch(error => {
                            document.querySelector('#resultContainer2').innerText = `出错了：${error.message}`;
                        });
                    
                    // 统一处理复制和下载按钮事件
                    output.addEventListener('click', function(event) {
                        // 复制功能
                        if (event.target.id.startsWith('copyBtn')) {
                            const targetId = 'copyTarget' + event.target.id.replace('copyBtn', '');
                            const copyTarget = document.querySelector(`#${targetId}`);
                            if (copyTarget) {
                                const range = document.createRange();
                                range.selectNode(copyTarget);
                                const selection = window.getSelection();
                                selection.removeAllRanges();
                                selection.addRange(range);
                                document.execCommand('copy');
                                selection.removeAllRanges();
                                layer.msg('复制成功！');
                            }
                        }
                        
                        // 下载功能
                        if (event.target.classList.contains('download-btn4')) {
                            const downloadUrl = event.target.getAttribute('data-url');
                            window.open(downloadUrl, '_blank');
                        }
                        if (event.target.classList.contains('download-btn5')) {
                            const downloadUrl = event.target.getAttribute('data-url');
                            window.open(downloadUrl, '_blank');
                        }
                    });
                });
            </script>
        </div>
    </div>
    <!--蓝奏云解析结束-->
    <!--页面底部版权区域-->
    
</body>
</html>
